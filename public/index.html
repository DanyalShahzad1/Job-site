<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Danyal Job Match Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0b0f;
      --bg-card: #12131a;
      --bg-card-hover: #181923;
      --bg-elevated: #1a1b26;
      --border: #1e2030;
      --border-light: #2a2d42;
      --text: #e2e4f0;
      --text-muted: #7a7f9a;
      --text-dim: #505370;
      --accent: #6c8aff;
      --accent-glow: rgba(108, 138, 255, 0.15);
      --green: #34d399;
      --green-bg: rgba(52, 211, 153, 0.08);
      --green-border: rgba(52, 211, 153, 0.2);
      --amber: #fbbf24;
      --amber-bg: rgba(251, 191, 36, 0.08);
      --amber-border: rgba(251, 191, 36, 0.2);
      --red: #f87171;
      --red-bg: rgba(248, 113, 113, 0.08);
      --red-border: rgba(248, 113, 113, 0.2);
      --blue: #60a5fa;
      --blue-bg: rgba(96, 165, 250, 0.08);
      --blue-border: rgba(96, 165, 250, 0.2);
      --purple: #a78bfa;
      --purple-bg: rgba(167, 139, 250, 0.08);
      --purple-border: rgba(167, 139, 250, 0.2);
      --radius: 10px;
      --radius-sm: 6px;
      --font: 'DM Sans', -apple-system, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- Scrollbar ---- */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

    /* ---- Layout ---- */
    .app-shell { max-width: 1120px; margin: 0 auto; padding: 40px 24px 80px; }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo-mark {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px; color: #fff;
    }
    .header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
    .header h1 span { color: var(--text-muted); font-weight: 400; }

    /* ---- Resume Bar ---- */
    .resume-bar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 22px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .resume-bar .icon {
      width: 36px; height: 36px;
      background: var(--accent-glow);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .resume-bar .icon svg { width: 18px; height: 18px; stroke: var(--accent); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .resume-bar .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 500; }
    .resume-bar .value { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-top: 2px; }

    /* ---- Controls Row ---- */
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .controls input {
      flex: 1;
      min-width: 180px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .controls input:focus { border-color: var(--accent); }
    .controls input::placeholder { color: var(--text-dim); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: #5a7af0; }
    .btn-primary:disabled {
      background: var(--border-light);
      color: var(--text-dim);
      cursor: not-allowed;
    }
    .btn-secondary {
      background: var(--bg-elevated);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--bg-card-hover); color: var(--text); }
    .btn-secondary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ---- Stats Row ---- */
    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .stat-chip {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 16px;
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .stat-chip .num {
      font-weight: 600;
      font-family: var(--mono);
      font-size: 15px;
    }
    .stat-chip.green .num { color: var(--green); }
    .stat-chip.amber .num { color: var(--amber); }
    .stat-chip.blue .num { color: var(--blue); }

    /* ---- Filter Tabs ---- */
    .filter-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-tab {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-tab:hover { border-color: var(--border-light); color: var(--text); }
    .filter-tab.active {
      background: var(--accent-glow);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ---- Job Cards ---- */
    .job-list { display: flex; flex-direction: column; gap: 10px; }

    .job-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      transition: all 0.2s;
      cursor: pointer;
    }
    .job-card:hover {
      border-color: var(--border-light);
      background: var(--bg-card-hover);
    }
    .job-card.expanded {
      border-color: var(--accent);
      background: var(--bg-card-hover);
    }

    .job-main { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
    .job-title-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .job-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .job-company { font-size: 14px; color: var(--text-muted); }
    .job-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .job-meta-item {
      font-size: 12px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .job-meta-item svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .type-badge {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid;
      white-space: nowrap;
    }
    .type-ft { color: var(--green); background: var(--green-bg); border-color: var(--green-border); }
    .type-contract { color: var(--purple); background: var(--purple-bg); border-color: var(--purple-border); }
    .type-intern { color: var(--blue); background: var(--blue-bg); border-color: var(--blue-border); }
    .type-pt { color: var(--amber); background: var(--amber-bg); border-color: var(--amber-border); }

    /* ---- Score Column ---- */
    .score-col {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      min-width: 70px;
    }
    .score-ring {
      width: 48px; height: 48px;
      position: relative;
    }
    .score-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .score-ring circle {
      fill: none;
      stroke-width: 3;
    }
    .score-ring .bg { stroke: var(--border); }
    .score-ring .fill { stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
    .score-val {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
    }

    .score-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-dim);
    }

    /* ---- Expanded Details ---- */
    .job-details {
      grid-column: 1 / -1;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      margin-top: 6px;
    }
    .job-reason {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 12px;
      padding: 10px 14px;
      background: var(--accent-glow);
      border-radius: var(--radius-sm);
      border-left: 3px solid var(--accent);
    }
    .job-reason strong { color: var(--accent); font-weight: 500; }
    .job-desc {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.7;
      max-height: 160px;
      overflow-y: auto;
      margin-bottom: 12px;
    }
    .job-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .job-link:hover { text-decoration: underline; }
    .job-link svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ---- Platform Links ---- */
    .platform-section {
      margin-bottom: 28px;
    }
    .platform-title {
      font-size: 12px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
      font-weight: 500;
    }
    .platform-links { display: flex; gap: 8px; flex-wrap: wrap; }
    .platform-link {
      font-size: 13px;
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      background: var(--blue-bg);
      border: 1px solid var(--blue-border);
      color: var(--blue);
      text-decoration: none;
      transition: all 0.2s;
    }
    .platform-link:hover { background: rgba(96, 165, 250, 0.15); }

    /* ---- Loading ---- */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 20px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--text-muted); }
    .loading-sub { font-size: 12px; color: var(--text-dim); }

    /* ---- Empty State ---- */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-dim);
    }
    .empty-state svg { width: 48px; height: 48px; stroke: var(--border-light); fill: none; stroke-width: 1.5; margin-bottom: 16px; }
    .empty-state p { font-size: 15px; margin-bottom: 6px; color: var(--text-muted); }
    .empty-state small { font-size: 13px; }

    /* ---- Error ---- */
    .error-banner {
      background: var(--red-bg);
      border: 1px solid var(--red-border);
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      margin-bottom: 20px;
      color: var(--red);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .error-banner svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }

    /* ---- Responsive ---- */
    @media (max-width: 640px) {
      .app-shell { padding: 24px 16px 60px; }
      .header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .job-card { grid-template-columns: 1fr; }
      .score-col { flex-direction: row; align-items: center; gap: 10px; }
      .controls { flex-direction: column; }
    }

    /* ---- Fade in animation ---- */
    .fade-in {
      animation: fadeIn 0.3s ease forwards;
      opacity: 0;
    }
    @keyframes fadeIn { to { opacity: 1; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ---- Config ----
    const RESUME_SUMMARY = "Danyal Shahzad — Master of Finance (McMaster DeGroote, GPA 3.7), Honours BComm Finance (GPA 3.5). Financial Analyst Intern at Martinrea International (14 months): Excel forecasting models for $20M+ budgets, variance analysis, ERP data extraction, executive dashboard creation. Skills: Financial Modeling, Valuation (DCF, Comps), Advanced Excel (VBA, Power Query), Power BI, SQL, Python, Bloomberg Terminal.";

    const PLATFORM_LINKS = {
      Indeed: [
        { label: "Financial Analyst — Toronto", url: "https://ca.indeed.com/jobs?q=financial+analyst&l=Toronto%2C+ON" },
        { label: "Entry Level Financial Analyst", url: "https://ca.indeed.com/jobs?q=entry+level+financial+analyst&l=Toronto%2C+ON" },
        { label: "FP&A Analyst", url: "https://ca.indeed.com/jobs?q=fp%26a+analyst&l=Toronto%2C+ON" },
        { label: "Junior Financial Analyst", url: "https://ca.indeed.com/jobs?q=junior+financial+analyst&l=Toronto%2C+ON" },
        { label: "Finance Internship", url: "https://ca.indeed.com/jobs?q=finance+internship&l=Toronto%2C+ON" },
      ]
    };

    const TYPE_MAP = {
      "Full-time": "type-ft",
      "Contract": "type-contract",
      "Internship": "type-intern",
      "Part-time": "type-pt",
    };

    // ---- Helper: score color ----
    function scoreColor(s) {
      if (s >= 75) return "var(--green)";
      if (s >= 50) return "var(--amber)";
      return "var(--red)";
    }

    // ---- ScoreRing Component ----
    function ScoreRing({ score }) {
      const r = 20;
      const circ = 2 * Math.PI * r;
      const offset = circ - (score / 100) * circ;
      const color = scoreColor(score);

      return (
        <div className="score-ring">
          <svg viewBox="0 0 48 48">
            <circle className="bg" cx="24" cy="24" r={r} />
            <circle className="fill" cx="24" cy="24" r={r}
              stroke={color}
              strokeDasharray={circ}
              strokeDashoffset={offset}
            />
          </svg>
          <div className="score-val" style={{ color }}>{score}</div>
        </div>
      );
    }

    // ---- JobCard Component ----
    function JobCard({ job, score, reason, expanded, onToggle }) {
      const typeClass = TYPE_MAP[job.type] || "type-ft";

      return (
        <div className={`job-card ${expanded ? "expanded" : ""}`} onClick={onToggle}>
          <div className="job-main">
            <div className="job-title-row">
              <span className="job-title">{job.title}</span>
              <span className={`type-badge ${typeClass}`}>{job.type}</span>
            </div>
            <div className="job-company">{job.company}</div>
            <div className="job-meta">
              <span className="job-meta-item">
                <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                {job.location}
              </span>
              {job.salary && (
                <span className="job-meta-item">
                  <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                  {job.salary}
                </span>
              )}
              {job.postedAt && (
                <span className="job-meta-item">
                  <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                  {job.postedAt}
                </span>
              )}
            </div>
          </div>

          {score !== undefined && (
            <div className="score-col">
              <ScoreRing score={score} />
              <span className="score-label">Match</span>
            </div>
          )}

          {expanded && (
            <div className="job-details fade-in">
              {reason && (
                <div className="job-reason">
                  <strong>AI Insight:</strong> {reason}
                </div>
              )}
              {job.description && (
                <div className="job-desc">{job.description}</div>
              )}
              {job.url && (
                <a className="job-link" href={job.url} target="_blank" rel="noopener noreferrer" onClick={e => e.stopPropagation()}>
                  View on Indeed
                  <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                </a>
              )}
            </div>
          )}
        </div>
      );
    }

    // ---- Main App ----
    function App() {
      const [jobs, setJobs] = useState([]);
      const [scores, setScores] = useState({});
      const [loading, setLoading] = useState(false);
      const [analyzing, setAnalyzing] = useState(false);
      const [error, setError] = useState(null);
      const [expanded, setExpanded] = useState(null);
      const [filter, setFilter] = useState("all");
      const [keywords, setKeywords] = useState("financial analyst");
      const [location, setLocation] = useState("Toronto, Ontario, Canada");

      // ---- Fetch Jobs ----
      const fetchJobs = useCallback(async () => {
        setLoading(true);
        setError(null);
        setJobs([]);
        setScores({});
        setExpanded(null);

        try {
          const res = await fetch("/api/jobs", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ keywords, location, jobCount: 20 }),
          });
          const data = await res.json();

          if (!res.ok) throw new Error(data.error || "Failed to fetch jobs");

          setJobs(data);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }, [keywords, location]);

      // ---- Analyze Jobs ----
      const analyzeJobs = useCallback(async () => {
        if (jobs.length === 0) return;
        setAnalyzing(true);
        setError(null);

        try {
          const res = await fetch("/api/analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ resume: RESUME_SUMMARY, jobs }),
          });
          const data = await res.json();

          if (!res.ok) throw new Error(data.error || "Analysis failed");

          const map = {};
          data.forEach(s => { map[s.id] = s; });
          setScores(map);
        } catch (err) {
          setError(err.message);
        } finally {
          setAnalyzing(false);
        }
      }, [jobs]);

      // ---- Filtered + Sorted Jobs ----
      const sortedJobs = [...jobs]
        .map(j => ({ ...j, _score: scores[j.id]?.score }))
        .sort((a, b) => (b._score || 0) - (a._score || 0));

      const filteredJobs = sortedJobs.filter(j => {
        if (filter === "all") return true;
        if (filter === "top") return (j._score || 0) >= 75;
        if (filter === "mid") return (j._score || 0) >= 50 && (j._score || 0) < 75;
        if (filter === "low") return (j._score || 0) < 50;
        return j.type === filter;
      });

      const hasScores = Object.keys(scores).length > 0;
      const topCount = sortedJobs.filter(j => (j._score || 0) >= 75).length;
      const avgScore = hasScores
        ? Math.round(sortedJobs.reduce((s, j) => s + (j._score || 0), 0) / sortedJobs.length)
        : 0;

      return (
        <div className="app-shell">
          {/* Header */}
          <div className="header">
            <div className="header-left">
              <div className="logo-mark">DJ</div>
              <h1>Job Match <span>Engine</span></h1>
            </div>
          </div>

          {/* Resume Bar */}
          <div className="resume-bar">
            <div className="icon">
              <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <div>
              <div className="label">Your Profile</div>
              <div className="value">{RESUME_SUMMARY.substring(0, 180)}...</div>
            </div>
          </div>

          {/* Platform Links */}
          <div className="platform-section">
            <div className="platform-title">Quick Search Links — Indeed</div>
            <div className="platform-links">
              {PLATFORM_LINKS.Indeed.map(link => (
                <a key={link.label} className="platform-link" href={link.url} target="_blank" rel="noopener noreferrer">
                  {link.label}
                </a>
              ))}
            </div>
          </div>

          {/* Search Controls */}
          <div className="controls">
            <input
              type="text"
              placeholder="Job title or keywords..."
              value={keywords}
              onChange={e => setKeywords(e.target.value)}
            />
            <input
              type="text"
              placeholder="Location..."
              value={location}
              onChange={e => setLocation(e.target.value)}
            />
            <button className="btn btn-primary" onClick={fetchJobs} disabled={loading}>
              {loading ? (
                <>
                  <svg viewBox="0 0 24 24" style={{animation:"spin 0.8s linear infinite"}}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                  Searching...
                </>
              ) : (
                <>
                  <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                  Search Jobs
                </>
              )}
            </button>
            <button className="btn btn-secondary" onClick={analyzeJobs} disabled={analyzing || jobs.length === 0}>
              {analyzing ? (
                <>
                  <svg viewBox="0 0 24 24" style={{animation:"spin 0.8s linear infinite"}}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                  Analyzing...
                </>
              ) : (
                <>
                  <svg viewBox="0 0 24 24"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
                  AI Match
                </>
              )}
            </button>
          </div>

          {/* Error */}
          {error && (
            <div className="error-banner">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              {error}
            </div>
          )}

          {/* Stats */}
          {hasScores && (
            <div className="stats-row fade-in">
              <div className="stat-chip blue">
                <span className="num">{jobs.length}</span> jobs found
              </div>
              <div className="stat-chip green">
                <span className="num">{topCount}</span> strong matches
              </div>
              <div className="stat-chip amber">
                <span className="num">{avgScore}</span> avg score
              </div>
            </div>
          )}

          {/* Filter Tabs */}
          {hasScores && (
            <div className="filter-tabs">
              {[
                { key: "all", label: "All" },
                { key: "top", label: "75+" },
                { key: "mid", label: "50–74" },
                { key: "low", label: "Under 50" },
                { key: "Full-time", label: "Full-time" },
                { key: "Internship", label: "Internship" },
                { key: "Contract", label: "Contract" },
              ].map(f => (
                <button
                  key={f.key}
                  className={`filter-tab ${filter === f.key ? "active" : ""}`}
                  onClick={() => setFilter(f.key)}
                >
                  {f.label}
                </button>
              ))}
            </div>
          )}

          {/* Loading */}
          {loading && (
            <div className="loading-state">
              <div className="spinner" />
              <div className="loading-text">Searching Indeed for jobs...</div>
              <div className="loading-sub">This usually takes 10–20 seconds</div>
            </div>
          )}

          {analyzing && (
            <div className="loading-state">
              <div className="spinner" />
              <div className="loading-text">Claude is analyzing job fit...</div>
              <div className="loading-sub">Scoring {jobs.length} jobs against your resume</div>
            </div>
          )}

          {/* Empty State */}
          {!loading && !analyzing && jobs.length === 0 && !error && (
            <div className="empty-state">
              <svg viewBox="0 0 24 24" strokeLinecap="round" strokeLinejoin="round">
                <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
              </svg>
              <p>No jobs loaded yet</p>
              <small>Enter keywords and location, then hit Search Jobs</small>
            </div>
          )}

          {/* Job List */}
          {!loading && !analyzing && filteredJobs.length > 0 && (
            <div className="job-list">
              {filteredJobs.map((job, i) => (
                <div key={job.id} className="fade-in" style={{ animationDelay: `${i * 40}ms` }}>
                  <JobCard
                    job={job}
                    score={scores[job.id]?.score}
                    reason={scores[job.id]?.reason}
                    expanded={expanded === job.id}
                    onToggle={() => setExpanded(expanded === job.id ? null : job.id)}
                  />
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
